name: Render README from template

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    # Only run when files that affect README rendering change
    paths:
      - 'scripts/render_readme.py'
      - '.github/workflows/render-readme.yml'
      - 'README.md'


permissions:
  contents: write

jobs:
  render:
    name: Render README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Render README
        run: python scripts/render_readme.py

      - name: Check for changes
        id: git-changes
        run: |
          echo "CHANGED=$(git status --porcelain)" >> $GITHUB_OUTPUT
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.git-changes.outputs.changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@3ea6ae190baf489ba007f7c92608f33ce20ef04a # v4.16.0
        with:
          commit_message: "chore: Fix README links"
          file_pattern: "README.md"
          branch: ${{ github.ref_name }}
